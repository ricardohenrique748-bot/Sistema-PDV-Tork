<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="6" fill="#F5A623"/>
  <!-- Faixa diagonal preta (da esquerda-baixo para direita-cima) -->
  <g transform="translate(24,24) rotate(-35)">
    <rect x="-18" y="-5" width="36" height="9" rx="2" fill="#1a1a1a"/>
  </g>
  <!-- Faixa diagonal dourada escura (da esquerda-cima para direita-baixo) -->
  <g transform="translate(24,24) rotate(35)">
    <rect x="-18" y="-5" width="36" height="9" rx="2" fill="#c47f00"/>
  </g>
  <!-- Faixa dourada (da esquerda-baixo para direita-cima, acima da preta) -->
  <g transform="translate(24,24) rotate(-35)">
    <rect x="-18" y="-11" width="36" height="6" rx="2" fill="#F5A623"/>
  </g>
</svg>
